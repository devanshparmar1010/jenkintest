openapi: 3.0.3

info:
  title: CloudSight AI API
  description: >
    CloudSight AI provides cloud cost intelligence, explainable FinOps recommendations,
    Prophet-based forecasting, executive reporting, and infrastructure optimization insights.
  version: 1.0.0

servers:
  - url: /api/v1
    description: MVP API

tags:
  - name: Upload
  - name: Dashboard
  - name: Recommendations
  - name: Resources
  - name: Forecast
  - name: FinOps Score
  - name: Reports

paths:
  /upload:
    post:
      tags:
        - Upload
      summary: Upload infrastructure datasets
      description: Uploads EC2, S3, EBS, RDS, and historical cost datasets.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                ec2:
                  type: string
                  format: binary
                s3:
                  type: string
                  format: binary
                ebs:
                  type: string
                  format: binary
                rds:
                  type: string
                  format: binary
                monthlyCost:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /dashboard:
    get:
      tags:
        - Dashboard
      summary: Executive dashboard metrics
      responses:
        "200":
          description: Dashboard overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"

  /recommendations:
    get:
      tags:
        - Recommendations
      summary: Retrieve optimization recommendations
      parameters:
        - in: query
          name: category
          schema:
            type: string
            enum:
              - EC2
              - S3
              - EBS
              - RDS
        - in: query
          name: risk
          schema:
            type: string
            enum:
              - LOW
              - MEDIUM
              - HIGH
        - in: query
          name: impact
          schema:
            type: string
            enum:
              - LOW
              - MEDIUM
              - HIGH
      responses:
        "200":
          description: Recommendation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"

  /resources:
    get:
      tags:
        - Resources
      summary: List infrastructure resources
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum:
              - EC2
              - S3
              - EBS
              - RDS
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Resource inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceCollection"

  /forecast:
    get:
      tags:
        - Forecast
      summary: Prophet-based cost forecast
      description: >
        Uses Meta Prophet for trend detection, seasonality analysis,
        confidence intervals, and executive summaries.
      responses:
        "200":
          description: Forecast results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastResponse"

  /score:
    get:
      tags:
        - FinOps Score
      summary: Retrieve Cloud Efficiency Score
      responses:
        "200":
          description: FinOps score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreResponse"

  /report:
    get:
      tags:
        - Reports
      summary: Download executive optimization report
      responses:
        "200":
          description: PDF report
          content:
            application/pdf:
              schema:
                type: string
                format: binary

components:
  schemas:
    UploadResponse:
      type: object
      properties:
        uploadId:
          type: string
        status:
          type: string
        resourcesDetected:
          type: integer

    DashboardResponse:
      type: object
      properties:
        monthlySpend:
          type: number
        potentialSavings:
          type: number
        savingsPercentage:
          type: number
        finOpsScore:
          type: integer
        forecastedSpend:
          type: number

    Recommendation:
      type: object
      properties:
        id:
          type: string
        resourceId:
          type: string
        resourceType:
          type: string
        title:
          type: string
        reason:
          type: string
        risk:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
        confidence:
          type: number
        monthlySavings:
          type: number
        annualSavings:
          type: number
        implementationSteps:
          type: array
          items:
            type: string

    Resource:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        utilization:
          type: number
        monthlyCost:
          type: number
        status:
          type: string

    ResourceCollection:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/Resource"

    ForecastResponse:
      type: object
      properties:
        model:
          type: string
          example: Prophet
        nextMonth:
          type: number
        threeMonthForecast:
          type: array
          items:
            type: number
        growthRate:
          type: number
        confidenceInterval:
          type: object
          properties:
            lower:
              type: number
            upper:
              type: number
        seasonalityDetected:
          type: boolean
        executiveSummary:
          type: string

    ScoreResponse:
      type: object
      properties:
        score:
          type: integer
        category:
          type: string
        breakdown:
          type: object
          properties:
            compute:
              type: integer
            storage:
              type: integer
            reservedCapacity:
              type: integer
        recommendations:
          type: array
          items:
            type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

x-architecture-notes:
  forecasting_engine: Prophet
  linear_regression_allowed: false
  recommendation_engine: Explainable FinOps Rules
  api_versioning_strategy: /api/v1
